server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: bankend-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/farm_mng_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: password
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.farm.mng.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体列表
    enable-after-add-doc: true
    enable-filter-multipart-api-method-type: POST
    enable-version: true
    enable-host: true
    enable-request-cache: true
    enable-reload-cache-parameter: true
    enable-debug: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 1.0
      paths-to-match: /**
      packages-to-scan: com.farm.mng.controller

jwt:
  secret: bankend-api-jwt-secret-key-256-bit-for-management-system
  expiration: 86400 # 24小时
  token-header: Authorization

upload:
  path: ./uploads/
  url-prefix: http://localhost:8081/api/uploads/

logging:
  level:
    com.farm.mng: debug
    com.baomidou.mybatisplus: debug